<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Mago das Utilidades | Grimório de Ofertas</title>
    <link rel="icon" type="image/png" href="assets/images/logooficial/logooficial.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:              #07050e;
            --gold:            #c9a227;
            --gold-light:      #f0d060;
            --gold-dark:       #6e520c;
            --parchment:       #ecddb8;
            --parchment-muted: #9d8a6b;
            --card-bg:         rgba(14, 9, 26, 0.93);
            --border-gold:     rgba(201, 162, 39, 0.22);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--parchment);
            line-height: 1.7;
            overflow-x: hidden;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 12% 85%, rgba(74,222,128,.10) 0%, transparent 42%),
                radial-gradient(ellipse at 88% 15%, rgba(168,85,247,.11)  0%, transparent 40%),
                radial-gradient(ellipse at 50% 2%,  rgba(249,115,22,.14)  0%, transparent 35%),
                radial-gradient(ellipse at 78% 80%, rgba(56,189,248,.08)  0%, transparent 38%);
        }

        /* ── Partículas ── */
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .spark {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: rise var(--dur) ease-in infinite var(--delay);
        }

        @keyframes rise {
            0%   { opacity: 0;   transform: translateY(0)      scale(0.4); }
            15%  { opacity: 0.9; }
            85%  { opacity: 0.3; }
            100% { opacity: 0;   transform: translateY(-110vh) scale(1.8) rotate(200deg); }
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }

        /* Banner de largura total */
        .full-width-section {
            width: 100%;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* ════════════════════════════════
           HERO — Avatar animado do Mago
        ════════════════════════════════ */
        .hero {
            position: relative;
            width: 100%;
            display: block; 
            text-align: center;
            padding: 4rem 0 3rem;
            /* overflow: hidden removido para permitir expansão total */
        }
    
/* Banner oficial full-width */
.promo-banner-wrapper {
    width: 100%;
    margin: 4rem 0;
    padding: 0;
    overflow: hidden;
    position: relative;
    z-index: 10;
}

.promo-banner-img-full {
    width: 100%;
    height: 600px;
    display: block;
    object-fit: cover;
    border-radius: 0;
    box-shadow: none;
}

        .hero-image {
            width: 100%;
            height: auto;
            display: block;
            /* Máscara radial para suavizar TODAS as bordas (não apenas a inferior) */
            mask-image: radial-gradient(circle at center, black 40%, transparent 95%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 95%);
            transform-origin: bottom center;
            animation: character-breathe 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(167,139,250,0.4));
        }

        @keyframes character-breathe {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.03) translateY(-5px); }
        }

        @keyframes floating-hero {
            0%, 100% { transform: translate(-50%, 0); }
            50%      { transform: translate(-50%, -15px); }
        }

        /* Brilho místico atrás do mago — Mais dinâmico */
        .hero-bg-glow {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(167,139,250,0.15) 0%, transparent 70%);
            filter: blur(60px);
            z-index: 1;
            pointer-events: none;
            animation: glow-pulse 6s infinite alternate;
        }

        @keyframes glow-pulse {
            from { opacity: 0.4; transform: translateX(-50%) scale(0.9); }
            to   { opacity: 0.8; transform: translateX(-50%) scale(1.2); }
        }

        /* Balão de fala adaptado */
        .speech-bubble {
            position: absolute;
            top: 20%;
            left: calc(50% + 140px);
            background: linear-gradient(135deg, rgba(30,10,60,0.97), rgba(20,5,40,0.97));
            border: 1px solid rgba(255,204,51,0.6);
            border-radius: 20px 20px 20px 4px;
            padding: 12px 18px;
            font-family: 'Crimson Text', serif;
            font-size: 1.05rem;
            font-style: italic;
            color: var(--parchment);
            max-width: 220px;
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        .speech-bubble.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            top: 14px;
            left: -10px;
            border: 6px solid transparent;
            border-right-color: rgba(201,162,39,0.6);
        }

        /* Overlay escuro entre mago e texto */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: transparent; /* filtro escuro removido */
            z-index: 2;
        }

        /* Halo mágico atrás do título */
        .invocation-halo {
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 520px;
            height: 280px;
            background: radial-gradient(ellipse, rgba(167,139,250,.22) 0%, rgba(96,165,250,.12) 45%, transparent 75%);
            border-radius: 50%;
            filter: blur(22px);
            animation: halo-breathe 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 3;
        }

        @keyframes halo-breathe {
            0%,100% { transform: translate(-50%,-50%) scale(1);    opacity: 0.8; }
            50%      { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
        }

        /* Conteúdo do título */
        .title-content {
            position: relative;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .crystal {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 0.75rem;
            animation: crystal-pulse 3.5s ease-in-out infinite;
            filter: drop-shadow(0 0 18px rgba(201,162,39,0.9));
        }

        .main-logo {
            width: 350px;
            height: auto;
            display: block;
            margin-bottom: 2rem;
            /* filtro removido para exibir a logo com as cores originais */
        }

        @keyframes crystal-pulse {
            0%,100% { filter: drop-shadow(0 0 14px rgba(201,162,39,.7)); transform: scale(1); }
            50%      { filter: drop-shadow(0 0 40px rgba(240,208,96,1));  transform: scale(1.07); }
        }

        .logo-eyebrow {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 0.42em;
            color: var(--gold);
            opacity: 0.7;
            text-transform: uppercase;
            margin-bottom: 0.6rem;
            animation: summon-in 1s ease both 0.3s;
        }

        .logo {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(160deg, #6e520c 0%, #f0d060 35%, #c9a227 55%, #f0d060 78%, #6e520c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 18px rgba(201,162,39,.5)) drop-shadow(0 0 40px rgba(167,139,250,.3));
            line-height: 1.15;
            animation: summon-in 1.1s ease both 0.5s, logo-glow 3s ease-in-out infinite 1.6s;
        }

        @keyframes summon-in {
            from { opacity: 0; transform: scale(0.88); filter: blur(10px); }
            to   { opacity: 1; transform: scale(1);    filter: blur(0); }
        }

        @keyframes logo-glow {
            0%,100% { filter: drop-shadow(0 0 14px rgba(201,162,39,.4)) drop-shadow(0 0 30px rgba(167,139,250,.2)); }
            50%      { filter: drop-shadow(0 0 30px rgba(201,162,39,.9)) drop-shadow(0 0 60px rgba(167,139,250,.6)); }
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.2rem auto 1rem;
            justify-content: center;
            animation: summon-in 1s ease both 0.8s;
        }

        .divider-line {
            width: 100px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
        }

        .divider span { color: var(--gold); font-size: 0.8rem; }

        .tagline {
            font-family: 'Crimson Text', serif;
            font-size: 1.25rem;
            font-style: italic;
            color: var(--parchment-muted);
            max-width: 500px;
            animation: summon-in 1s ease both 1s;
        }

        /* ── Scroll hint ── */
        .scroll-hint {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            opacity: 0.4;
            z-index: 5;
        }

        .scroll-hint span {
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: var(--gold);
        }

        .scroll-arrow {
            width: 1px;
            height: 28px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            animation: scroll-drop 1.5s ease-in-out infinite;
        }

        @keyframes scroll-drop {
            0%,100% { transform: scaleY(0.6); opacity: 0.4; }
            50%      { transform: scaleY(1);   opacity: 1; }
        }

        /* ── Seção de produtos ── */
        .products-section {
            padding-top: 1.5rem;
        }

        .section-label {
            text-align: center;
            margin-bottom: 2rem;
        }

        .section-label h2 {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 0.3em;
            color: var(--gold);
            opacity: 0.7;
            text-transform: uppercase;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
            gap: 2rem;
            padding-bottom: 5rem;
        }

        /* ── Cards ── */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-gold);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
            backdrop-filter: blur(14px);
        }

        .product-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 0%, var(--pc-a) 0%, transparent 65%);
            opacity: 0.07;
            pointer-events: none;
            transition: opacity 0.35s;
        }

        .product-card:hover::after  { opacity: 0.16; }
        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--pc-border);
            box-shadow: 0 0 45px var(--pc-glow), 0 22px 45px rgba(0,0,0,.55);
        }

        .product-card[data-p="green"]  { --pc-a:#4ade80; --pc-glow:rgba(74,222,128,.30);  --pc-border:rgba(74,222,128,.40);  --pc-badge:#4ade80; }
        .product-card[data-p="purple"] { --pc-a:#a855f7; --pc-glow:rgba(168,85,247,.30);  --pc-border:rgba(168,85,247,.40);  --pc-badge:#a855f7; }
        .product-card[data-p="blue"]   { --pc-a:#38bdf8; --pc-glow:rgba(56,189,248,.30);  --pc-border:rgba(56,189,248,.40);  --pc-badge:#38bdf8; }
        .product-card[data-p="amber"]  { --pc-a:#f97316; --pc-glow:rgba(249,115,22,.30);  --pc-border:rgba(249,115,22,.40);  --pc-badge:#f97316; }

        .card-topline {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--pc-badge), transparent);
        }

        .card-image-wrap {
            position: relative;
            overflow: hidden;
            height: 220px;
            background: linear-gradient(135deg, rgba(14,9,26,0.95), rgba(26,15,50,0.9));
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Preenche todo o espaço sem bordas brancas */
            object-position: center;
            display: block;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: brightness(1.05) contrast(1.1) saturate(1.1); /* Melhora qualidade visual */
        }

        .product-card:hover .product-image {
            transform: scale(1.08);
        }

        .card-image-fade {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 75%, var(--card-bg) 100%);
            opacity: 0.3; /* Suavizado para não esconder o produto */
        }

        .card-body {
            padding: 1.2rem 1.7rem 1.7rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .category {
            font-family: 'Cinzel', serif;
            font-size: 0.62rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--pc-badge);
            margin-bottom: 0.45rem;
        }

        .product-name {
            font-family: 'Cinzel', serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--parchment);
            margin-bottom: 0.7rem;
            line-height: 1.35;
        }

        .description {
            font-family: 'Crimson Text', serif;
            font-size: 1rem;
            color: var(--parchment-muted);
            margin-bottom: 1.4rem;
            flex-grow: 1;
        }

        /* ── Categorias ── */
        .category-container {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin: 0 auto 3rem;
            flex-wrap: wrap;
            max-width: 900px;
        }

        .category-btn {
            background: rgba(26, 21, 59, 0.4);
            border: 1px solid rgba(201, 162, 39, 0.2);
            color: var(--parchment);
            padding: 0.8rem 1.6rem;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .category-btn:hover {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(201, 162, 39, 0.3);
            color: var(--gold-light);
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: var(--gold);
            color: #0b021d;
            border-color: var(--gold-light);
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.5);
            font-weight: 700;
        }

        .price-tag {
            font-family: 'Cinzel', serif;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--gold-light);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: baseline;
            gap: 0.2rem;
            filter: drop-shadow(0 0 10px rgba(240,208,96,.45));
            position: relative;
        }

        .original-price {
            font-size: 0.9rem;
            text-decoration: line-through;
            color: var(--parchment-muted);
            position: absolute;
            top: -1.2rem;
            left: 0;
            opacity: 0.7;
        }

        .currency { font-size: 1rem; color: var(--gold); }

        /* ── Banner Promocional ── */
        /* Banner deletado daki e movido para wrapper global */

        .promo-banner:hover img {
            transform: scale(1.02);
        }

        .promo-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(11,2,29,0.3), transparent);
            pointer-events: none;
        }

        /* ── Pesquisa ── */
        .search-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: var(--gold);
            margin-bottom: 1.2rem;
            letter-spacing: 0.15em;
            text-shadow: 0 0 10px rgba(201,162,39,0.3);
            text-transform: uppercase;
        }

        .search-container {
            margin: 0 auto;
            width: 90%;
            max-width: 500px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-bar-wrap {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            background: rgba(45, 30, 80, 0.5);
            border: 1px solid rgba(201, 162, 39, 0.3);
            border-radius: 30px;
            padding: 1rem 1.5rem 1rem 3.5rem;
            color: var(--parchment);
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.4);
            background: rgba(60, 40, 110, 0.7);
        }

        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-size: 1.2rem;
            pointer-events: none;
            opacity: 0.7;
        }

        .buy-button {
            background: linear-gradient(135deg, #180e00, #3a2200);
            border: 1px solid var(--gold-dark);
            color: var(--gold-light);
            text-decoration: none;
            padding: 0.85rem 1.5rem;
            border-radius: 10px;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.09em;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .buy-button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--pc-a), transparent 70%);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .buy-button:hover { border-color: var(--gold); color: #fff; box-shadow: 0 0 22px var(--pc-glow); }
        .buy-button:hover::before { opacity: 0.22; }
        .buy-button:active { transform: scale(0.97); }

        /* ── Footer ── */
        footer {
            padding: 3rem 0;
            text-align: center;
            border-top: 1px solid rgba(201,162,39,.1);
            position: relative;
            z-index: 1;
        }

        footer p {
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            color: var(--parchment-muted);
            opacity: 0.55;
        }

        /* ── CORREÇÃO DEFINITIVA BANNER FULL WIDTH ── */
        .promo-banner-wrapper {
            width: 100vw !important;
            max-width: 100vw !important;
            margin: 0 0 2rem 0 !important; /* margem superior zerada para ficar perto da logo */
            position: relative !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            padding: 0 !important;
            overflow: hidden !important;
            border-radius: 0 !important;
            border: none !important;
            z-index: 100;
        }

        .promo-banner-img-full {
            width: 100% !important;
            height: auto !important;
            display: block !important;
            object-fit: fill !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            image-rendering: high-quality;
            filter: contrast(1.08) saturate(1.15) brightness(1.03) sharpen(1);
            -webkit-filter: contrast(1.08) saturate(1.15) brightness(1.03);
        }

        @media (max-width: 768px) {
            .hero { min-height: 440px; padding: 3rem 0 2.5rem; }
            .logo { font-size: 2rem; }
            .crystal { font-size: 2.8rem; }
            .invocation-halo { width: 300px; height: 180px; }

            .promo-banner-img-full { height: 220px; }
            .promo-banner-wrapper { margin: 2rem 0; }

            /* Fix grid para telas muito pequenas */
            .products-grid { grid-template-columns: 1fr; }

            /* Reduz backdrop-filter para melhorar performance */
            .product-card { backdrop-filter: none; -webkit-backdrop-filter: none; }
        }
    </style>
</head>
<body>

<div id="particles"></div>

<!-- ══ BANNER TOPO ══ -->
<div class="promo-banner-wrapper">
    <img src="assets/images/banneroficial.png" alt="Promoção Mágica" class="promo-banner-img-full" id="promo-banner-img">
</div>

<!-- ══ HERO ══ -->
<header class="hero">
    <div class="hero-bg-glow"></div>
    <div class="hero-overlay"></div>
    <div class="invocation-halo"></div>

    <div class="container">

        <!-- Título centralizado na frente -->
        <div class="title-content">
            <img src="assets/images/logooficial.png" alt="Mago das Utilidades Logo" class="main-logo">
            <div class="logo-eyebrow">✦ Grimório de Ofertas ✦</div>
            <div class="logo">Mago das Utilidades</div>
            <div class="divider">
                <div class="divider-line"></div>
                <span>✦</span><span>✦</span><span>✦</span>
                <div class="divider-line"></div>
            </div>
            <p class="tagline">Artefatos e encantamentos para facilitar o seu dia a dia.</p>
        </div> <!-- Fim de title-content -->
    </div> <!-- Fim de container -->
</header>


    <div class="container">

            <div class="search-container">
                <h3 class="search-title">Explorar Artefatos</h3>
                <div class="search-bar-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="search-input" placeholder="O que você procura, viajante?">
                </div>
            </div>

        </div>

    </header>

    <div class="container">

    <!-- ══ PRODUTOS ══ -->
    <section class="products-section">
        <div class="section-label">
            <h2>⚗ &nbsp; Artefatos Encantados &nbsp; ⚗</h2>
        </div>

        <div class="category-container">
            <button class="category-btn active" onclick="filterCategory('Todos')">Todos</button>
            <button class="category-btn" onclick="filterCategory('Fitness')">Fitness</button>
            <button class="category-btn" onclick="filterCategory('Cozinha')">Cozinha</button>
            <button class="category-btn" onclick="filterCategory('Sala')">Sala</button>
            <button class="category-btn" onclick="filterCategory('Eletrônicos')">Eletrônicos</button>
        </div>

        <div class="products-grid" id="product-grid"></div>
    </section>

    <footer>
        <p>✦ &nbsp; 2026 Mago das Utilidades &nbsp;✦&nbsp; Todos os direitos reservados &nbsp; ✦</p>
    </footer>

</div>

<script>
    /* ── Partículas ── */
    const pContainer = document.getElementById('particles');
    const SPARK_COLORS = ['#c9a227','#f0d060','#4ade80','#a855f7','#38bdf8','#f97316'];
    const sparkCount = window.innerWidth < 768 ? 20 : 65;
    for (let i = 0; i < sparkCount; i++) {
        const el = document.createElement('div');
        el.className = 'spark';
        const sz = 1.5 + Math.random() * 2.5;
        const color = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];
        el.style.cssText = `
            left:${Math.random()*100}%;
            bottom:${Math.random()*15}%;
            width:${sz}px; height:${sz}px;
            background:${color};
            box-shadow:0 0 ${sz*3}px ${color};
            --dur:${7+Math.random()*13}s;
            --delay:-${Math.random()*15}s;
        `;
        pContainer.appendChild(el);
    }

    let allProducts = [];

    async function loadProducts() {
        try {
            const resp = await fetch('produtos.json');
            allProducts = await resp.json();
            renderProducts(allProducts);
        } catch(e) { console.error('Erro ao carregar o grimório:', e); }
    }

    function renderProducts(products) {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        
        const colors = ['amber', 'purple', 'blue', 'green'];
        
        products.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('data-p', colors[index % colors.length]);
            
            const imgHtml = p.image_url ? `
                <div class="card-image-wrap">
                    <img src="${p.image_url}" alt="${p.name}" class="product-image" loading="lazy" onerror="this.parentElement.style.display='none'">
                    <div class="card-image-fade"></div>
                </div>` : '';

            const originalPriceHtml = p.original_price ? `
                <span class="original-price">R$ ${p.original_price}</span>` : '';

            card.innerHTML = `
                <div class="card-topline"></div>
                ${imgHtml}
                <div class="card-body">
                    <div class="category">✦ ${p.categories_names[0]}</div>
                    <h2 class="product-name">${p.name}</h2>
                    <p class="description">${p.description}</p>
                    <div class="price-tag">
                        ${originalPriceHtml}
                        <span class="currency">R$</span>
                        <span>${p.regular_price}</span>
                    </div>
                    <a href="${p.external_url}" class="buy-button" target="_blank">⚗&nbsp; ${p.button_text}</a>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filterCategory(cat) {
        // Limpa busca ao trocar categoria
        document.getElementById('search-input').value = '';
        
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === cat);
        });

        if (cat === 'Todos') {
            renderProducts(allProducts);
        } else {
            const filtered = allProducts.filter(p => p.categories_names.includes(cat));
            renderProducts(filtered);
        }
    }

    /* ── Busca Funcional ── */
    document.getElementById('search-input').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        
        // Reseta botões de categoria se estiver buscando
        if (term.length > 0) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
        } else {
            document.querySelector('.category-btn').classList.add('active'); // Reativa "Todos"
        }

        const filtered = allProducts.filter(p => 
            p.name.toLowerCase().includes(term) || 
            p.description.toLowerCase().includes(term) ||
            p.categories_names.some(c => c.toLowerCase().includes(term))
        );
        renderProducts(filtered);
    });

    loadProducts();


</script>
</body>
</html>
